<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>疯狂园丁</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="1280" height="720" aria-label="疯狂园丁游戏画布"></canvas>
      <section id="menu" class="overlay">
        <h1>疯狂园丁</h1>
        <p class="control-hint">A/D 移动 / 空格跳跃 / 鼠标瞄准 / 左键开枪 / 右键挥枪托</p>
        <div class="menu-actions">
          <button id="rifleToggle" type="button">步枪模式：关</button>
          <button id="rifleFireModeToggle" type="button">步枪射击：单发</button>
          <button id="cheatMenuButton" type="button">作弊模式</button>
          <button id="levelMode" type="button">关卡模式</button>
          <button id="endlessMode" type="button">无尽模式</button>
          <button id="balloonMode" type="button">打气球模式：手枪</button>
          <button id="createDuelRoom" type="button">创建对战房间</button>
          <button id="createCoopRoom" type="button">创建双人无尽</button>
        </div>
        <div class="multiplayer-menu">
          <input id="playerNameInput" type="text" autocomplete="name" maxlength="14" placeholder="你的名字">
          <input id="roomCodeInput" type="text" inputmode="numeric" autocomplete="off" placeholder="输入4位房间号">
          <button id="joinRoomButton" type="button">加入房间</button>
        </div>
        <p id="multiplayerStatus" class="control-hint">联机：未连接</p>
        <p id="rifleModeHint" class="control-hint">单发伤害更高。连发伤害低一些，但速度更快。</p>
        <p class="control-hint">打气球模式：手枪模式，不受霰弹枪和步枪影响。</p>
      </section>
      <section id="nextLevelPanel" class="next-level-panel hidden">
        <div class="next-level-title">通关！</div>
        <button id="nextLevelButton" type="button">下一关</button>
        <div id="postBossWeaponChoices" class="failure-actions hidden">
          <button id="chooseRifleButton" type="button">使用步枪</button>
          <button id="chooseShotgunButton" type="button">继续霰弹枪</button>
          <div id="postBossRifleModeChoices" class="failure-actions hidden">
            <button id="chooseRifleSingleButton" type="button">步枪单发</button>
            <button id="chooseRifleAutoButton" type="button">步枪连发</button>
          </div>
        </div>
      </section>
      <section id="failurePanel" class="next-level-panel hidden">
        <div class="failure-title">失败</div>
        <div class="failure-actions">
          <button id="retryButton" type="button">重来</button>
          <button id="mainMenuButton" type="button">主菜单</button>
        </div>
      </section>
      <button id="pauseMenuButton" class="pause-menu-button hidden" type="button" aria-expanded="false">菜单</button>
      <section id="pausePanel" class="pause-panel hidden">
        <div class="pause-title">暂停</div>
        <div class="failure-actions">
          <button id="resumeButton" type="button">继续</button>
          <button id="pauseCheatButton" type="button">作弊模式</button>
          <button id="pauseMainMenuButton" type="button">主菜单</button>
        </div>
      </section>
      <section id="cheatPanel" class="cheat-panel hidden">
        <div class="pause-title">作弊模式</div>
        <div class="cheat-grid">
          <label><input id="cheatEnabled" type="checkbox"> 启用作弊</label>
          <label><input id="cheatInvincible" type="checkbox"> 无敌</label>
          <label><input id="cheatInfiniteAmmo" type="checkbox"> 无限弹药</label>
          <label>伤害倍率 <input id="cheatDamage" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>速度倍率 <input id="cheatSpeed" type="number" min="0.1" max="5" step="0.1" value="1"></label>
          <label>跳跃倍率 <input id="cheatJump" type="number" min="0.1" max="5" step="0.1" value="1"></label>
          <label>生命 <input id="cheatHealth" type="number" min="1" max="999" step="1" value="100"></label>
          <label>关卡 <input id="cheatLevel" type="number" min="1" max="100" step="1" value="1"></label>
          <label>铁门硬度 <input id="cheatShieldBlocks" type="number" min="1" max="30" step="1" value="3"></label>
          <label>普通血量 <input id="cheatNormalHealth" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>快跑血量 <input id="cheatFastHealth" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>防爆门血量 <input id="cheatFatHealth" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>小跳史莱姆血量 <input id="cheatSlimeLowHealth" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>中跳史莱姆血量 <input id="cheatSlimeMidHealth" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>高跳史莱姆血量 <input id="cheatSlimeHighHealth" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>气球血量 <input id="cheatBalloonHealth" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>冲锋 Boss 血量 <input id="cheatTankBossHealth" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>远程 Boss 血量 <input id="cheatRangedBossHealth" type="number" min="0.1" max="20" step="0.1" value="1"></label>
          <label>Boss 召唤间隔 <input id="cheatBossAddSeconds" type="number" min="0.2" max="30" step="0.1" value="5"></label>
          <label>Boss 召唤数量 <input id="cheatBossAddCount" type="number" min="1" max="10" step="1" value="1"></label>
          <label>冲锋间隔 <input id="cheatTankChargeSeconds" type="number" min="0.5" max="30" step="0.1" value="7"></label>
          <label>半血冲锋间隔 <input id="cheatTankEnragedChargeSeconds" type="number" min="0.5" max="30" step="0.1" value="5"></label>
          <label>远程 Boss 间隔 <input id="cheatRangedBossCooldown" type="number" min="0.2" max="30" step="0.1" value="2.8"></label>
          <label>远程 Boss 弹数 <input id="cheatRangedBossShots" type="number" min="0.25" max="10" step="0.25" value="1"></label>
        </div>
        <p id="cheatReminder" class="cheat-reminder hidden">关闭前请先点“应用参数”和“设置生命”。</p>
        <div class="cheat-actions">
          <button id="cheatApplyButton" class="danger-action" type="button">应用参数</button>
          <button id="cheatHealButton" class="danger-action" type="button">设置生命</button>
          <button id="cheatAmmoButton" type="button">补满弹药</button>
          <button id="cheatLevelButton" type="button">跳到关卡</button>
          <button id="cheatSpawnNormalButton" type="button">生成普通僵尸</button>
          <button id="cheatSpawnFatButton" type="button">生成防爆门</button>
          <button id="cheatSpawnSlimeButton" type="button">生成史莱姆</button>
          <button id="cheatClearButton" type="button">清空怪物</button>
          <button id="cheatCloseButton" type="button">关闭</button>
        </div>
      </section>
      <section id="hud" class="hud" aria-live="polite"></section>
    </main>
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
